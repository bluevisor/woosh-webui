shared_representation_size: 1024
text_preprocessing: no_op
audio:
  name: passt_no
  sample_rate: 32000
  segment_length: 5
  embedding_dim: 128
  aggregate: mean
  type: embedding
  adopt_n_layers: 0
  adopt_layer_size: 2048
  s_patchout_t: 0
  s_patchout_f: 0
  eval_max_sec: 60
  mask_attention: false
sentence:
  model: roberta-large
  max_sentence_tokens: 77
  adopt_n_layers: 0
  adopt_layer_size: 2048
  pool_type: eos
  add_pooling_layer: true
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
normalize: true
